name: Build Desktop Downloads

on:
  push:
    branches:
      - main
    paths:
      - "desktop/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-desktop-downloads.yml"
      - "proxy-browser.desktop.example.json"
      - ".env.example"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows desktop bundle
        shell: powershell
        run: npm run desktop:pack

      - name: Upload Windows desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-bundle
          path: desktop-dist/proxy-browser-desktop-bundle.zip

  mac-desktop:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build mac desktop app
        run: npm run desktop:dir:mac

      - name: Prepare mac desktop bundle
        run: |
          mkdir -p dist/macos-bundle
          cp proxy-browser.desktop.example.json dist/macos-bundle/proxy-browser.desktop.json
          APP_PATH="$(find desktop-dist -maxdepth 2 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          cp -R "$APP_PATH" dist/macos-bundle/
          ditto -c -k --sequesterRsrc --keepParent dist/macos-bundle dist/proxy-browser-desktop-mac-bundle.zip

      - name: Upload mac desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-desktop-bundle
          path: dist/proxy-browser-desktop-mac-bundle.zip

  release-assets:
    runs-on: ubuntu-latest
    needs:
      - windows-desktop
      - mac-desktop
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-desktop-bundle
          path: dist/windows

      - name: Download mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-desktop-bundle
          path: dist/mac

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-build-${{ github.run_number }}
          name: Desktop Build ${{ github.run_number }}
          prerelease: true
          body: |
            Windows:
            - `proxy-browser-desktop-bundle.zip` contains the working Windows desktop launcher bundle.
            - Users can change proxy settings directly inside the desktop app UI.

            Mac:
            - `proxy-browser-desktop-mac-bundle.zip` contains the unsigned mac desktop launcher bundle.
            - Users can change proxy settings directly inside the desktop app UI.
            - The included `proxy-browser.desktop.json` is an optional template if you prefer file-based config.
            - Because the mac app is unsigned, macOS may require Right Click -> Open the first time.
          files: |
            dist/windows/proxy-browser-desktop-bundle.zip
            dist/mac/proxy-browser-desktop-mac-bundle.zip

name: Build Mobile Downloads

on:
  push:
    branches:
      - main
    paths:
      - "public/**"
      - "android/**"
      - "ios/**"
      - "capacitor.config.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-mobile-downloads.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android
        run: npm run cap:android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Prepare Android artifact
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/proxy-browser-android-debug.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/proxy-browser-android-debug.apk

  ios-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package iOS project
        run: |
          mkdir -p dist
          zip -r dist/proxy-browser-ios-project.zip ios capacitor.config.json public README.md PWA-USAGE.txt package.json

      - name: Upload iOS project artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: dist/proxy-browser-ios-project.zip

  release-assets:
    runs-on: ubuntu-latest
    needs:
      - android-apk
      - ios-project
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/android

      - name: Download iOS project artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-project
          path: dist/ios

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-build-${{ github.run_number }}
          name: Mobile Build ${{ github.run_number }}
          prerelease: true
          body: |
            Android:
            - Download `proxy-browser-android-debug.apk` and install it directly on Android.

            iOS:
            - `proxy-browser-ios-project.zip` contains the Capacitor iOS project.
            - Apple signing is still required before that native iOS build can be installed on an iPhone.
            - For direct iPhone install right now, use the live iOS PWA link in `PWA-USAGE.txt`.
          files: |
            dist/android/proxy-browser-android-debug.apk
            dist/ios/proxy-browser-ios-project.zip
